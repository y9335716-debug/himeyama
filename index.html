<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姫山塾</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  color: #333;
}
  
header {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1584697964350-3e14c2b5a8e1");
  background-size: cover;
  color: white;
  text-align: center;
  padding: 100px 20px;
}

header h1 {
  font-size: 40px;
}

.btn {
  background: #ff6b6b;
  color: white;
  padding: 12px 25px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

.section {
  padding: 60px 20px;
  max-width: 1000px;
  margin: auto;
}

.features {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  flex: 1;
  min-width: 250px;
  background: #f9f9f9;
  padding: 20px;
  border-radius: 10px;
}

.results {
  background: #f4f4f4;
  text-align: center;
  padding: 60px 20px;
}

.cta {
  background: #2c3e50;
  color: white;
  text-align: center;
  padding: 60px 20px;
}

/* フォーム */
.contact-form {
  max-width: 600px;
  margin: 30px auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.contact-form input,
.contact-form textarea,
.contact-form select {
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.contact-form textarea {
  height: 150px;
}

.contact-form button {
  background: #ff6b6b;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
}
</style>
</head>

<body>

<header>
  <h1>姫山塾</h1>
  <p>「できない」を「できる」に変える個別指導</p>
  <a href="#contact" class="btn">無料体験はこちら</a>
</header>

<section class="section">
  <h2>姫山塾の特徴</h2>
  <div class="features">
    <div class="card">
      <h3>完全個別指導</h3>
      <p>一人ひとりに合わせた学習プラン</p>
    </div>
    <div class="card">
      <h3>成績アップ保証</h3>
      <p>結果にこだわる指導</p>
    </div>
    <div class="card">
      <h3>安心サポート</h3>
      <p>保護者との連携も重視</p>
    </div>
  </div>
</section>

<section class="results">
  <h2>実績</h2>
  <p>・偏差値 +15アップ<br>・第一志望合格多数</p>
</section>

<section class="cta">
  <h2>まずは無料体験へ</h2>
  <p>お気軽にお問い合わせください</p>
  <a href="#contact" class="btn">今すぐ申し込む</a>
</section>

<!-- ここから追加 -->
<section class="section" id="contact">
  <h2>お問い合わせ</h2>
  <p style="text-align:center;">30秒で完了｜無料体験受付中</p>

  <form action="https://formspree.io/f/あなたのID" method="POST" class="contact-form">

    <input type="text" name="name" placeholder="お名前" required>

    <input type="email" name="email" placeholder="メールアドレス" required>

    <input type="tel" name="phone" placeholder="電話番号">

    <select name="grade" required>
      <option value="">学年を選択</option>
      <option>小学生</option>
      <option>中学生</option>
      <option>高校生</option>
    </select>

    <textarea name="message" placeholder="お問い合わせ内容" required></textarea>

    <!-- スパム対策 -->
    <input type="text" name="_gotcha" style="display:none">

    <button type="submit">無料体験に申し込む</button>

  </form>
</section>
<!-- ここまで -->

<footer>
  <p>© 姫山塾</p>
</footer>

</body>
</html>
